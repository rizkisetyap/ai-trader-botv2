services:
  # 1. Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Port aplikasi
      - "15672:15672" # Dashboard admin RabbitMQ
    restart: always

  # 2. .NET API
  api:
    build: ./backend-net
    ports:
      - "5000:8080"
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq
    volumes:
      - ./backend-net/db-ai_bot.db:/app/db-ai_bot.db
    restart: always

  # 3. Python AI Worker
  worker:
    build: ./worker-python
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq
    restart: always