name: Deploy Backend API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore tests
        run: dotnet restore UnitTest/backend-net.Tests/backend-net.Tests.csproj

      - name: Run tests
        run: dotnet test UnitTest/backend-net.Tests/backend-net.Tests.csproj --configuration Release --no-restore

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy VPS deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: scripts/vps-deploy.sh
          target: ~/ai-trader-bot-vps-deploy.sh

      - name: Run deploy script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: REPO_URL,BRANCH,DEPLOY_DIR
          script: |
            chmod +x ~/ai-trader-bot-vps-deploy.sh
            ~/ai-trader-bot-vps-deploy.sh
        env:
          REPO_URL: https://github.com/rizkisetyap/ai-trader-botv2.git
          BRANCH: main
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}