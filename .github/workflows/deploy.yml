name: Deploy Backend API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore tests
        run: dotnet restore UnitTest/backend-net.Tests/backend-net.Tests.csproj

      - name: Run tests
        run: dotnet test UnitTest/backend-net.Tests/backend-net.Tests.csproj --configuration Release --no-restore

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: REPO_URL,BRANCH,DEPLOY_DIR
          script: |
            set -euo pipefail

            REPO_URL="${REPO_URL:-https://github.com/rizkisetyap/ai-trader-botv2.git}"
            BRANCH="${BRANCH:-main}"
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/ai-trader-bot}"

            # Pastikan folder dan repositori sudah ada di VPS
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              rm -rf "$DEPLOY_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # 1. Hapus folder siluman yang dibuat oleh Docker sebelumnya (jika ada)
            rm -rf backend-net/db-ai_bot.db
            
            # 2. Buat folder untuk penyimpanan database dan beri izin tulis (Write)
            mkdir -p db-data
            chmod 777 db-data

            # 3. Jalankan ulang Docker
            docker compose up -d --build
        env:
          REPO_URL: https://github.com/rizkisetyap/ai-trader-botv2.git
          BRANCH: main
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}